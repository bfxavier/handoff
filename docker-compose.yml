services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/readyz"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      - "traefik.http.middlewares.handoff-buffering.buffering.maxResponseBodyBytes=0"
      - "traefik.http.middlewares.handoff-buffering.buffering.memResponseBodyBytes=0"

volumes:
  redis-data:
